# ============================================================
# Local Tournament Management System - Application Properties
# ============================================================

# Server
server.port=8080
# NOTE: No context-path set — URLs are:
#   http://localhost:8080/auth/login
#   http://localhost:8080/tournaments
#   http://localhost:8080/swagger-ui/index.html
# If you want /api prefix, uncomment the line below AND update all curl examples
# server.servlet.context-path=/api

# Database Configuration (Update credentials before running)
spring.datasource.url=jdbc:mysql://localhost:3306/tournament_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=3690
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT Configuration
jwt.secret=Y291cnNlQWxsQ29udGVudFRvdXJuYW1lbnRTeXN0ZW1TZWNyZXRLZXlGb3JKV1QyMDI0
jwt.expiration=86400000

# Logging
logging.level.com.tournament=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Swagger UI — access at http://localhost:8080/swagger-ui/index.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.override-with-generic-response=false

# CORS (adjust for production)
cors.allowed-origins=http://localhost:3000,http://localhost:5173

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
