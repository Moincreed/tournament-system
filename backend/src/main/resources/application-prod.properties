# ============================================================
# PRODUCTION properties — used when SPRING_PROFILES_ACTIVE=prod
# All sensitive values read from environment variables
# ============================================================

# Database — set these as environment variables in Railway/Render/VPS
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# NEVER use 'create' or 'create-drop' in production!
spring.jpa.hibernate.ddl-auto=update

# JWT — set a long random secret in environment
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Disable SQL logging in production
spring.jpa.show-sql=false
logging.level.com.tournament=WARN
logging.level.org.springframework.security=WARN

# CORS — set to your actual frontend domain
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://yourdomain.com}

# Connection pool tuning for production
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
